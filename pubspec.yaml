name: furimail
description: Email client for Furi Labs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  enough_mail: ^2.1.6
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.6
  path_provider: ^2.1.4
  path: ^1.9.1
  intl: ^0.19.0
  caldav_client: ^1.1.0
  file_picker: ^8.1.2
  # flutter_html: ^3.0.0-beta.2 
  # flutter_html_table: ^3.0.0-beta.1 # Add this for table support
  flutter_widget_from_html: ^0.16.0 # Uncomment to test the new package
  flutter_secure_storage: ^9.0.0
  html: ^0.15.4
  provider: ^6.0.5
  win32: ^5.5.1 
  url_launcher: ^6.3.0  
  webview_flutter: ^4.0.0  # Use latest version
  permission_handler: ^11.3.1
  timezone: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.2
  mockito: ^5.4.0
  build_runner: ^2.4.0
  fake_async: ^1.3.1
  flutter_distributor: ^0.0.5

flutter:
  uses-material-design: true

dependency_overrides:
  xml: ^6.0.0